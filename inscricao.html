<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscrição Rota 28</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#090712;--card:#11101d;--card2:#181629;--border:#33224a;--txt:#f4f1ff;--muted:#a29bb2;--mag:#ea22eb;--cyan:#01cfab;--grad:linear-gradient(135deg,#ea22eb,#01cfab);--danger:#ff6b6b;--ok:#01cfab}body{min-height:100vh;background:radial-gradient(circle at top left,rgba(234,34,235,.22),transparent 36%),radial-gradient(circle at bottom right,rgba(1,207,171,.17),transparent 34%),var(--bg);color:var(--txt);font-family:'Montserrat',sans-serif;padding:24px}.wrap{width:100%;max-width:820px;margin:0 auto}.hero{text-align:center;padding:28px 0 18px}.logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:28px;letter-spacing:.04em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}.hero h1{font-family:'Montserrat',sans-serif;font-size:clamp(30px,5vw,52px);line-height:1;margin:14px 0 10px}.hero p{color:var(--muted);font-size:16px}.card{background:rgba(17,16,29,.92);border:1px solid var(--border);border-radius:22px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(10px)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:14px}.full{grid-column:1/-1}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px;font-weight:700}input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;color:var(--txt);font:inherit;padding:14px;outline:none}input:focus,select:focus,textarea:focus{border-color:var(--mag);box-shadow:0 0 0 3px rgba(234,34,235,.12)}textarea{min-height:96px;resize:vertical}.hint{font-size:13px;color:var(--muted);margin-top:6px}.btn{width:100%;border:0;border-radius:14px;padding:16px;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:white;background:var(--grad);cursor:pointer;margin-top:8px}.btn:disabled{opacity:.55;cursor:not-allowed}.msg{display:none;border-radius:14px;padding:14px;margin-top:16px;line-height:1.55}.msg.ok{display:block;background:rgba(1,207,171,.1);border:1px solid rgba(1,207,171,.35);color:#bafff1}.msg.err{display:block;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.35);color:#ffd2d2}.code{font-family:'Montserrat',sans-serif;font-weight:800;color:#fff;background:rgba(255,255,255,.1);padding:3px 8px;border-radius:8px}.footer{text-align:center;color:var(--muted);font-size:12px;margin:20px 0}@media(max-width:680px){body{padding:16px}.card{padding:18px}.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="logo">ROTA 28</div>
    <h1>Página de Inscrição</h1>
  </section>

  <form id="form" class="card">
    <div class="grid">
      <div class="field full"><label>Nome completo *</label><input id="nome" required autocomplete="name"></div>
      <div class="field"><label>WhatsApp *</label><input id="telefone" required inputmode="tel" placeholder="(14) 99999-9999"></div>
      <div class="field"><label>E-mail</label><input id="email" type="email" autocomplete="email"></div>
      <div class="field"><label>Data de nascimento</label><input id="nascimento" type="date"></div>
      <div class="field full"><label>SELECIONE O SEU PROTOCOLO *</label><select id="protocolo" required>
        <option value="">Selecione...</option>
        <option value="rota28_1">Rota 28.1 (se você ainda não participou do Rota 28)</option>
        <option value="rota28_2">Rota 28.2 (se você já participou do Rota 28)</option>
      </select></div>
    </div>
    <button id="btn" class="btn" type="submit">ENVIAR INSCRIÇÃO</button>
    <div id="msg"></div>
  </form>
  <div class="footer">Após o envio, o aluno aparecerá automaticamente em Admin &gt; Alunos.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDrXoEWTJtdml0UeBP1nVlsR7AovqEd_RQ",
  authDomain: "rota-28.firebaseapp.com",
  databaseURL: "https://rota-28-default-rtdb.firebaseio.com",
  projectId: "rota-28",
  storageBucket: "rota-28.firebasestorage.app",
  messagingSenderId: "714266147692",
  appId: "1:714266147692:web:25521ae1742be5381fd149",
  measurementId: "G-NWGKV8NR42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);
let protocolos = {};
let alunosExistentes = [];

function normalizar(txt){return String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'');}
function soNumeros(txt){return String(txt||'').replace(/\D/g,'');}
function msg(tipo, html){const el=$('msg'); el.className='msg '+tipo; el.innerHTML=html;}
function val(id){return $(id).value.trim();}

async function carregarProtocolos(){
  const snapProt = await getDocs(collection(db,'protocolos'));
  protocolos = {};
  snapProt.forEach(d => { protocolos[d.id] = d.data().v; });

  const snapAlunos = await getDocs(collection(db,'alunos'));
  alunosExistentes = [];
  snapAlunos.forEach(d => { const a = d.data().v || {}; if(a.codigo) alunosExistentes.push(String(a.codigo).toLowerCase()); });
}

function resolverProtocoloId(escolha){
  const lista = Object.values(protocolos);
  if(escolha === 'rota28_1'){
    const p = lista.find(x => normalizar(x.nome).includes('rota281') || normalizar(x.nome).includes('rota28.1'));
    return p?.id || 'rota28_1';
  }
  if(escolha === 'rota28_2'){
    const p = lista.find(x => normalizar(x.nome).includes('rota282') || normalizar(x.nome).includes('rota28.2'));
    return p?.id || 'rota28_2';
  }
  return escolha;
}

function gerarCodigo(nome, telefone){
  const primeiro = normalizar(nome).slice(0,10) || 'aluno';
  const digitos = soNumeros(telefone).slice(-4) || String(Date.now()).slice(-4);
  let base = `${primeiro}${digitos}`.toLowerCase();
  let codigo = base, i = 2;
  while(alunosExistentes.includes(codigo)){ codigo = base + i; i++; }
  return codigo;
}

$('form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = $('btn'); btn.disabled = true; btn.textContent = 'ENVIANDO...';
  try{
    const nome = val('nome');
    const telefone = val('telefone');
    const protocoloEscolhido = val('protocolo');
    const protocoloId = resolverProtocoloId(protocoloEscolhido);
    if(!nome || !telefone || !protocoloId) throw new Error('Preencha nome, WhatsApp e protocolo.');
    const codigo = gerarCodigo(nome, telefone);
    const id = 'aluno_' + Date.now();
    const protocoloNome = protocolos[protocoloId]?.nome || (protocoloEscolhido === 'rota28_1' ? 'Rota 28.1' : 'Rota 28.2');
    const aluno = {
      id, nome, codigo, protocoloId,
      criadoEm: new Date().toISOString(),
      origem: 'pagina_inscricao',
      inscricao: {
        telefone,
        email: val('email'),
        nascimento: val('nascimento'),
        protocoloEscolhido,
        protocoloNome
      }
    };
    await setDoc(doc(db,'alunos',id), { v: aluno });
    alunosExistentes.push(codigo);
    $('form').reset();
    msg('ok', `Inscrição enviada com sucesso!<br>Cadastro criado no Rota 28.<br>Código de acesso do aluno: <span class="code">${codigo}</span>`);
  }catch(err){
    console.error(err);
    msg('err', 'Não foi possível enviar a inscrição. ' + (err.message || 'Tente novamente.'));
  }finally{
    btn.disabled = false; btn.textContent = 'ENVIAR INSCRIÇÃO';
  }
});

carregarProtocolos().catch(err=>{console.error(err); msg('err','Erro ao carregar os dados. Verifique a conexão e as regras do Firebase.');});
</script>
</body>
</html>
